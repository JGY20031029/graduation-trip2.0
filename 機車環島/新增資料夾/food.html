<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😋 美食清單 - 青春環島</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .add-form {
            background: #ffffff; padding: 20px; border-radius: 20px; margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px dashed var(--food-color);
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: inherit;
        }
        .submit-btn {
            background: var(--food-color); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%;
        }
        .food-item-wrapper { display: inline-block; position: relative; margin: 5px; }
        .food-del {
            position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; cursor: pointer; line-height: 14px; text-align: center; padding:0;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">🏠 首頁</a>
    <a href="schedule.html">📅 行程</a>
    <a href="hotel.html">🏨 住宿</a>
    <a href="food.html" class="active">😋 美食</a>
    <a href="checklist.html">🎒 裝備</a>
    <a href="notes.html">⚠️ 注意</a>
</nav>

<div class="container">

    <div class="add-form">
        <h3 style="margin-top:0; color: var(--food-color);">➕ 想吃什麼自己加！</h3>
        <div class="form-group">
            <label>選擇落腳站</label>
            <select id="foodStation">
                <option value="tainan">台南站</option>
                <option value="mid">嘉義/高雄站</option>
                <option value="east">東部站（台東/花蓮/宜蘭）</option>
            </select>
        </div>
        <div class="form-group">
            <label>店名或小吃名稱</label>
            <input type="text" id="foodName" placeholder="Ex: 🍖 阿裕牛肉湯">
        </div>
        <button class="submit-btn" onclick="addFood()">加入必吃清單 ➔</button>
    </div>

    <div class="day-block">
        <h3>😋 沿途必吃特搜</h3>
        
        <div style="margin-bottom: 20px;">
            <p><b>台南站：</b></p>
            <a href="javascript:void(0)" class="food-btn">🍜 文章牛肉湯</a>
            <a href="javascript:void(0)" class="food-btn">🍔 丹丹漢堡</a>
            <span id="list-tainan"></span>
        </div>
        
        <div style="margin-bottom: 20px;">
            <p><b>嘉義/高雄站：</b></p>
            <a href="javascript:void(0)" class="food-btn">🍹 御香屋</a>
            <a href="javascript:void(0)" class="food-btn">🦆 鴨肉珍</a>
            <span id="list-mid"></span>
        </div>
        
        <div style="margin-bottom: 20px;">
            <p><b>東部站：</b></p>
            <a href="javascript:void(0)" class="food-btn">🎡 東大門夜市</a>
            <a href="javascript:void(0)" class="food-btn">🥟 卑南豬血湯</a>
            <a href="javascript:void(0)" class="food-btn">🍧 正氣路米苔目</a>
            <span id="list-east"></span>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    window.onload = function() {
        displayFoods();
    };

    function addFood() {
        const station = document.getElementById('foodStation').value;
        const name = document.getElementById('foodName').value;

        if (!name) {
            alert('請輸入美食名稱！');
            return;
        }

        const newFood = { station, name, id: Date.now() };
        let foods = JSON.parse(localStorage.getItem('myFoods')) || [];
        foods.push(newFood);
        localStorage.setItem('myFoods', JSON.stringify(foods));

        document.getElementById('foodName').value = '';
        displayFoods();
    }

    function displayFoods() {
        // 先清空原本動態產生的按鈕
        document.getElementById('list-tainan').innerHTML = '';
        document.getElementById('list-mid').innerHTML = '';
        document.getElementById('list-east').innerHTML = '';

        let foods = JSON.parse(localStorage.getItem('myFoods')) || [];

        foods.forEach(food => {
            const targetSpan = document.getElementById('list-' + food.station);
            if (targetSpan) {
                targetSpan.innerHTML += `
                    <span class="food-item-wrapper" id="food-${food.id}">
                        <a href="javascript:void(0)" class="food-btn">${food.name}</a>
                        <button class="food-del" onclick="deleteFood(${food.id})">&times;</button>
                    </span>
                `;
            }
        });
    }

    function deleteFood(id) {
        let foods = JSON.parse(localStorage.getItem('myFoods')) || [];
        foods = foods.filter(food => food.id !== id);
        localStorage.setItem('myFoods', JSON.stringify(foods));
        displayFoods();
    }
</script>
</body>
</html>
