<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5/29 青春環島：四極點征途</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #f39c12;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --youth-gradient: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 8rem 1rem;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('S__20799622_0.jpg'); 
            background-size: cover;
            background-position: center 50%;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        header h1 { 
            color: var(--accent); 
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }
        header p { 
            font-size: 1.3rem;
            margin: 0 0 30px 0;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .enter-btn {
            background: var(--youth-gradient);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(230, 126, 34, 0.4);
            transition: 0.3s;
        }
        .enter-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.6);
        }
    </style>
</head>
<body>

<header>
    <h1>🎓 青春環島：四極點大滿貫</h1>
    <p>2026.05.29 - 06.04 | 逆時針熱血挑戰</p>
    <a href="schedule.html" class="enter-btn">點我開啟征途 🏍️</a>
</header>

</body>
</html>
