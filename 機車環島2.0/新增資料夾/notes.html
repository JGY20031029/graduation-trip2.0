        <h3>⛽ 加油策略</h3>
        <p>進入<b>南迴公路</b>與<b>蘇花公路</b>前，務必加滿油。尤其是東部段，看到加油站建議就補滿。</p>
    </div>
    <div class="note-card">
        <h3>🌧️ 天氣應對</h3>
        <p>5月底正值梅雨季，行李務必使用<b>大塑膠袋進行內層防水</b>，防止衣物全濕。</p>
    </div>
    <div class="note-card">
        <h3>🏍️ 行車安全</h3>
        <p>蘇花公路砂石車多，切勿強行超車。保持距離，安全是回家唯一的路。</p>
    </div>
